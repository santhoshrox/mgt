server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: anything not on disk falls through to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets, but not the HTML entrypoint.
    location ~* \.(?:js|css|png|svg|jpg|jpeg|gif|ico|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
