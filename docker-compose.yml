# Single-host self-host stack for mgt-be + mgt-ui + Postgres + OpenSearch.
# Copy .env.example to .env and fill in the GitHub OAuth + secret values
# before `docker compose up`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mgt
      POSTGRES_USER: mgt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mgt}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mgt -d mgt"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - "9200:9200"

  mgt-be:
    build:
      # Build from the repo root so the multi-module workspace (mgt-be +
      # mgt-proto) is available; the `replace` in mgt-be/go.mod points to
      # ../mgt-proto.
      context: .
      dockerfile: mgt-be/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      MGT_ADDR: ":8080"
      MGT_GRPC_ADDR: ":9090"
      MGT_BASE_URL: ${MGT_BASE_URL:-http://localhost:8080}
      MGT_UI_BASE_URL: ${MGT_UI_BASE_URL:-http://localhost:3000}
      DATABASE_URL: postgres://mgt:${POSTGRES_PASSWORD:-mgt}@postgres:5432/mgt?sslmode=disable
      OPENSEARCH_URL: http://opensearch:9200
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      MGT_MASTER_KEY: ${MGT_MASTER_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8080:8080"   # REST (consumed by mgt-ui)
      - "9090:9090"   # gRPC (consumed by mgt-cli)

  mgt-ui:
    build:
      context: ./mgt-ui
      args:
        VITE_API_URL: ${MGT_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - mgt-be
    ports:
      - "3000:80"

volumes:
  pgdata:
  osdata:
